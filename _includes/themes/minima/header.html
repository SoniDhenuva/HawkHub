    <header class="site-header hawknest-header">
        <div class="wrapper">
            {%- assign default_paths = site.pages | map: "path" -%}
            {%- assign page_paths = site.minima.nav_pages | default: default_paths -%}
            {%- assign titles_size = site.pages | map: 'title' | join: '' | size -%}
            <a class="site-title hawknest-title" rel="author" href="{{ '/' | relative_url }}" data-value="{{ site.title | escape }}">
                <span class="hawk">HAWK</span><span class="nest">Nest</span>
            </a>

            {%- if titles_size > 0 -%}
            <nav class="site-nav">
                <input type="checkbox" id="nav-trigger" class="nav-trigger" />
                <label for="nav-trigger">
                    <span class="menu-icon">
                        <svg viewBox="0 0 18 15" width="18px" height="15px">
                            <path
                                d="M18,1.484c0,0.82-0.665,1.484-1.484,1.484H1.484C0.665,2.969,0,2.304,0,1.484l0,0C0,0.665,0.665,0,1.484,0 h15.032C17.335,0,18,0.665,18,1.484L18,1.484z M18,7.516C18,8.335,17.335,9,16.516,9H1.484C0.665,9,0,8.335,0,7.516l0,0 c0-0.82,0.665-1.484,1.484-1.484h15.032C17.335,6.031,18,6.696,18,7.516L18,7.516z M18,13.516C18,14.335,17.335,15,16.516,15H1.484 C0.665,15,0,14.335,0,13.516l0,0c0-0.82,0.665-1.483,1.484-1.483h15.032C17.335,12.031,18,12.695,18,13.516L18,13.516z" />
                        </svg>
                    </span>
                </label>

                                <div class="trigger">
                                    <a class="page-link" href="{{ site.baseurl }}/search">COURSE</a>
                                    <a class="page-link" href="{{ site.baseurl }}/search">SEARCH</a>
                    <a id="loginArea" class="page-link" href="{{ site.baseurl }}/login">Login</a>
                </div>
            </nav>
            {%- endif -%}
        </div>
    </header>

        <style>
            .site-header.hawknest-header {
                background: #071427;
                border-bottom: 1px solid #0d2744;
            }

            .hawknest-header .wrapper {
                display: flex;
                align-items: center;
                justify-content: space-between;
            }

            .hawknest-header .page-link {
                color: #cde8ff;
            }

            .hawknest-title {
                font-family: 'Orbitron', sans-serif;
                font-size: clamp(1.8rem, 3.2vw, 2.8rem);
                font-weight: 800;
                line-height: 1;
                text-decoration: none !important;
            }

            .hawknest-title .hawk {
                color: #39b226;
                margin-right: 0.2rem;
            }

            .hawknest-title .nest {
                color: #1d9ad2;
                font-style: italic;
                font-weight: 500;
            }
        </style>

    <script type="module" src="{{ site.baseurl }}/assets/js/api/login.js"></script>
